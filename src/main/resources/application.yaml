spring:
  application:
    name: virtualbank

  # ── Base de données H2 en mémoire ─────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:virtualbankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── Console H2 (accessible sur /h2-console) ───────────────────────────────
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create-drop        # recrée le schéma à chaque démarrage (dev)
    show-sql: true
    open-in-view: false            # évite les lazy-loading involontaires
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.H2Dialect

# ── Serveur ───────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always        # affiche le message d'erreur dans les réponses
    include-binding-errors: always

# ── Springdoc / Swagger UI ────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  show-actuator: true

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  info:
    app:
      name: VirtualBank
      description: API REST de gestion de comptes bancaires
      version: 1.0.0-SNAPSHOT

# ── Logs ──────────────────────────────────────────────────────────────────────
logging:
  level:
    com.virtuallink.virtualbank: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # affiche les valeurs des paramètres SQL
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
